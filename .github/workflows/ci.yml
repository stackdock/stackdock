name: CI

# Runs the test suite on pull requests and non-main pushes. Pushes to main are
# already tested by deploy.yml's `test` job (which gates the deploy on green),
# so we skip main here to avoid running the whole suite twice on every push.
on:
  pull_request: {}
  push:
    branches-ignore: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest
