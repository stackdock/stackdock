name: CI

# Runs the test suite on every push (including main) and on pull requests.
# Deploys no longer happen on push — they're gated on publishing a release
# (see deploy.yml) — so CI is what keeps main green between releases.
on:
  pull_request: {}
  push: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest
