name: CI

# Runs the test suite on pull requests and on pushes to any branch other than
# main. (Pushes to main are tested + gated inside deploy.yml before release.)
on:
  pull_request: {}
  push:
    branches-ignore: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest
