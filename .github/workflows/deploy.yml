name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a deploy manually from the Actions tab

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/stackdock
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            # health check from inside the compose network (port 8000 isn't published on the host)
            sleep 5
            docker compose exec -T caddy wget -qO- http://stackdock:8000/healthz \
              || (echo "Health check failed" && docker compose logs --tail=50 stackdock && exit 1)
