name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a deploy manually from the Actions tab

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest

  deploy:
    needs: test          # never deploy a red build to the droplet
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/stackdock
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            # health check from inside the compose network (port 8000 isn't published on the host)
            sleep 5
            docker compose exec -T caddy wget -qO- http://stackdock:8000/healthz \
              || (echo "Health check failed" && docker compose logs --tail=50 stackdock && exit 1)
            # smoke test: every expected service must be running
            for svc in stackdock caddy uptime-kuma; do
              state=$(docker compose ps -q "$svc" | xargs -r docker inspect -f '{{.State.Running}}')
              [ "$state" = "true" ] || (echo "Service $svc is not running" && docker compose ps && exit 1)
            done
            echo "Deploy OK: all services running"

  monitor:
    needs: deploy        # confirm the droplet itself is healthy at DO's level
    runs-on: ubuntu-latest
    steps:
      - name: Check droplet health via DigitalOcean API
        env:
          DO_TOKEN: ${{ secrets.DO_API_TOKEN }}
          DROPLET_ID: ${{ secrets.DO_DROPLET_ID }}
        run: |
          if [ -z "$DO_TOKEN" ] || [ -z "$DROPLET_ID" ]; then
            echo "DO_API_TOKEN / DO_DROPLET_ID not set — skipping DigitalOcean monitoring."
            exit 0
          fi
          api() { curl -fsS -H "Authorization: Bearer $DO_TOKEN" "https://api.digitalocean.com/v2$1"; }
          status=$(api "/droplets/$DROPLET_ID" | jq -r '.droplet.status')
          echo "Droplet status: $status"
          [ "$status" = "active" ] || { echo "::error::Droplet is '$status', not active"; exit 1; }
          # recent CPU/memory from DO monitoring (informational; never fails the build)
          end=$(date +%s); start=$((end-900))
          load=$(api "/monitoring/metrics/droplet/load_5?host_id=$DROPLET_ID&start=$start&end=$end" \
                 | jq -r '.data.result[0].values[-1][1] // "n/a"')
          echo "Droplet load_5 (latest): $load"
          echo "DigitalOcean monitoring OK: droplet active"
