<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Saved episodes</title>
  <!-- Self-contained on purpose: this page is precached and must render with
       ZERO network. No server data lives here — the episode list and audio
       come from this device's Cache Storage + localStorage. -->
  <style>
    :root { --paper:#f6f7f4; --panel:#fff; --ink:#1c2420; --soft:#5a665f; --acc:#2e6e4e; --rule:#d8ddd8; }
    @media (prefers-color-scheme: dark) {
      :root { --paper:#141816; --panel:#1d2320; --ink:#e6eae7; --soft:#9aa69f; --acc:#4da97c; --rule:#2d3531; }
    }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--paper); color:var(--ink);
           font-family: system-ui, -apple-system, sans-serif;
           padding: max(1rem, env(safe-area-inset-top)) 1rem max(2rem, env(safe-area-inset-bottom)); }
    h1 { font-size:1.2rem; } .soft { color:var(--soft); font-size:0.85rem; }
    a { color: var(--acc); }
    ul { list-style:none; padding:0; }
    li { background:var(--panel); border:1px solid var(--rule); border-radius:8px;
         padding:0.8rem 1rem; margin:0.6rem 0; }
    .t { font-weight:600; } .s { color:var(--soft); font-size:0.8rem; }
    audio { width:100%; margin-top:0.5rem; }
    button { background:none; border:1px solid var(--rule); color:var(--soft);
             border-radius:6px; padding:0.25rem 0.6rem; cursor:pointer; margin-top:0.4rem; }
  </style>
</head>
<body>
  <h1>📦 Saved on this device</h1>
  <p class="soft">These play with no connection. Positions still save locally and
    sync back when you're online. <a href="/">← back to Chudstack</a></p>
  <p class="soft" id="quota"></p>
  <ul id="list"></ul>
  <p class="soft" id="empty" hidden>Nothing saved yet. Open an episode and tap
    “📦 Save for offline” before your flight.</p>

<script>
(async () => {
  const AUDIO_CACHE = "stackdock-audio-v1";
  const list = document.getElementById("list");
  const c = await caches.open(AUDIO_CACHE);
  const keys = await c.keys();
  if (!keys.length) document.getElementById("empty").hidden = false;

  function fmt(b) {
    b = b || 0;
    if (b < 1048576) return (b / 1024).toFixed(0) + " KB";
    if (b < 1073741824) return (b / 1048576).toFixed(0) + " MB";
    if (b < 1099511627776) return (b / 1073741824).toFixed(1) + " GB";
    return (b / 1099511627776).toFixed(2) + " TB";
  }

  // Best-effort server sync. The page renders fully offline, but positions
  // accumulated offline must still reach listen_positions so they survive the
  // iOS PWA<->Safari storage split and follow you to other devices. These calls
  // no-op/fail silently with no connection and flush when you're back online.
  // Resolves true only when the server CONFIRMED the write — a beacon can't
  // confirm, so it resolves false and the flag stays "pending" for the flusher.
  // No navigator.onLine gate: it gives false negatives; a truly-offline fetch
  // just rejects (caught) and resolves false.
  function pushServer(slug, position, duration, done, useBeacon) {
    const body = JSON.stringify({ position: position || 0, duration: duration || 0, done: !!done });
    try {
      if (useBeacon && navigator.sendBeacon) {
        navigator.sendBeacon("/api/positions/" + slug, new Blob([body], { type: "text/plain" }));
        return Promise.resolve(false);
      }
      return fetch("/api/positions/" + slug, { method: "POST", credentials: "same-origin",
        keepalive: true, headers: { "Content-Type": "application/json" }, body })
        .then((r) => !!(r && r.ok)).catch(() => false);
    } catch { return Promise.resolve(false); }
  }
  async function flushPositions(slugs) {
    if (!slugs.length) return;
    let server = {};
    try {
      const r = await fetch("/api/positions", { credentials: "same-origin" });
      // A failed GET is NOT an empty server: proceeding with {} would make every
      // synced done-flag look "un-done elsewhere" and delete it (the expired-
      // session data-loss bug). 401 here = logged out; bail entirely.
      if (!r.ok) return;
      server = await r.json();
    } catch { return; }
    for (const slug of slugs) {
      const sp = server[slug] || {};
      const doneLocal = localStorage.getItem("done:" + slug);   // "1"|"pending"|null
      if (doneLocal === "pending") {
        // finished offline, not yet synced -> push; promote ONLY on confirmed
        // success (an unconditional promote here + a dropped push = the server
        // never learns, then the "1"-vs-server branch erases the local flag)
        pushServer(slug, 0, parseFloat(localStorage.getItem("dur:" + slug) || sp.duration || 0), true, false)
          .then((ok) => { if (ok) try { localStorage.setItem("done:" + slug, "1"); } catch {} });
        continue;
      }
      if (doneLocal === "1" && !sp.done) {
        // server was un-done elsewhere (another device resumed) -> defer to server
        try {
          localStorage.removeItem("done:" + slug);
          if (sp.position) localStorage.setItem("pos:" + slug, String(sp.position));
        } catch {}
        continue;
      }
      if (sp.done) { try { localStorage.setItem("done:" + slug, "1"); } catch {} continue; }
      const local = parseFloat(localStorage.getItem("pos:" + slug) || "0");
      if ((sp.position || 0) > local) {                     // server further -> adopt locally
        try { localStorage.setItem("pos:" + slug, String(sp.position));
              if (sp.duration) localStorage.setItem("dur:" + slug, String(sp.duration)); } catch {}
      } else if (local > (sp.position || 0) + 2 && local > 5) {   // offline gains -> push up
        const dur = parseFloat(localStorage.getItem("dur:" + slug) || "0");
        pushServer(slug, local, dur, false, false);
      }
    }
  }

  // Safari 16.4+: declare playback intent — the only sanctioned audio-session
  // lever on iOS; harmless elsewhere.
  try { if (navigator.audioSession) navigator.audioSession.type = "playback"; } catch {}

  // Point the OS "now playing" session at whichever episode is currently playing.
  // `bound` remembers it so a return to foreground can re-assert the session —
  // iOS drops the Now Playing entry ~30s after pause and only a clean rebuild
  // on reopen brings the controls back promptly.
  let bound = null;
  function positionState(audio) {
    if (!("mediaSession" in navigator) || !navigator.mediaSession.setPositionState) return;
    if (!isFinite(audio.duration)) return;
    try {
      navigator.mediaSession.setPositionState({
        duration: audio.duration,
        position: Math.min(audio.currentTime || 0, audio.duration),
        playbackRate: audio.playbackRate || 1 });
    } catch {}
  }
  function bindMedia(audio, meta) {
    if (!("mediaSession" in navigator)) return;
    bound = { audio: audio, meta: meta };
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: meta.title || "Saved episode",
        artist: meta.show || "Chudstack (offline)",
        // two declared sizes of the same art: pre-iOS-18 the compact player
        // wants a small entry; iOS 18+ uses the large one properly
        artwork: meta.art ? [{ src: meta.art, sizes: "128x128" },
                             { src: meta.art, sizes: "512x512" }] : [],
      });
      navigator.mediaSession.setActionHandler("play", () => audio.play());
      navigator.mediaSession.setActionHandler("pause", () => audio.pause());
      navigator.mediaSession.setActionHandler("seekbackward", () => {
        audio.currentTime = Math.max(0, audio.currentTime - 15); });
      navigator.mediaSession.setActionHandler("seekforward", () => {
        audio.currentTime = Math.min(audio.duration || 1e9, audio.currentTime + 30); });
      try { navigator.mediaSession.setActionHandler("seekto", (d) => {
        if (d.seekTime != null) audio.currentTime = d.seekTime; }); } catch {}
      try { navigator.mediaSession.playbackState = audio.paused ? "paused" : "playing"; } catch {}
      positionState(audio);
    } catch {}
  }
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && bound) bindMedia(bound.audio, bound.meta);
  });
  window.addEventListener("pageshow", () => {
    if (bound) bindMedia(bound.audio, bound.meta);
  });

  // resolve slugs up front and pull server positions into localStorage BEFORE
  // building the list, so each element resumes from the freshest known position
  const slugs = keys.map((req) => new URL(req.url).pathname.replace("/offline-audio/", ""));
  await flushPositions(slugs);

  let savedBytes = 0;   // total size of the saved episode audio (summed below)

  for (const req of keys) {
    const slug = new URL(req.url).pathname.replace("/offline-audio/", "");
    let meta = {};
    try { meta = JSON.parse(localStorage.getItem("offline:" + slug) || "{}"); } catch {}
    const li = document.createElement("li");
    const t = document.createElement("div"); t.className = "t";
    t.textContent = meta.title || slug;
    const s = document.createElement("div"); s.className = "s";
    s.textContent = (meta.show || "") +
      (meta.savedAt ? " · saved " + new Date(meta.savedAt).toLocaleDateString() : "");
    const audio = document.createElement("audio");
    audio.controls = true; audio.preload = "metadata";
    // size from the cached response's Content-Length header — reading it does NOT
    // pull the whole blob into memory (loading every blob OOM-crashed the page).
    const cached = await c.match(req);
    const clen = parseFloat(cached.headers.get("content-length") || "0");
    savedBytes += clen > 0 ? clen : (await cached.blob()).size;  // blob only if header absent
    // stream from the SW's /offline-audio/ handler (served out of AUDIO_CACHE)
    // instead of a giant object URL — one episode's bytes in memory at a time
    audio.src = "/offline-audio/" + slug;
    // resume from the same per-episode position the main player uses
    const pos = parseFloat(localStorage.getItem("pos:" + slug) || "0");
    audio.addEventListener("loadedmetadata", () => {
      // store duration too — index progress bars need dur:{slug} > 0 to render,
      // and the server push carries it for cross-device resume
      if (audio.duration) try { localStorage.setItem("dur:" + slug, String(audio.duration)); } catch {}
      if (pos > 10 && pos < audio.duration - 20 && !localStorage.getItem("done:" + slug))
        audio.currentTime = pos;
    });
    let last = 0, lastPush = 0, played = false;
    const persist = (leaving) => {
      const t = audio.currentTime || 0;
      if (t <= 5) return;                          // never stomp a real position with ~0
      try { localStorage.setItem("pos:" + slug, String(t)); } catch {}
      if (leaving || Date.now() - lastPush > 10000) {
        lastPush = Date.now();
        pushServer(slug, t, audio.duration || 0, false, leaving);
      }
    };
    audio.addEventListener("play", () => {
      played = true;
      // Pause any other saved episode so only one plays at a time, then claim the
      // Media Session for THIS audio. Without an active media session iOS treats
      // background/locked playback as fair game and pauses it ("random pauses");
      // registering it keeps audio alive off-screen and lights up lock-screen keys.
      document.querySelectorAll("audio").forEach((o) => { if (o !== audio) o.pause(); });
      bindMedia(audio, meta);
    });
    audio.addEventListener("timeupdate", () => {
      if (Date.now() - last > 4000) { last = Date.now(); persist(false); }
      if (bound && bound.audio === audio && !audio.paused) positionState(audio);
    });
    audio.addEventListener("play", () => {
      if (bound && bound.audio === audio) {
        try { navigator.mediaSession.playbackState = "playing"; } catch {}
      }
    });
    audio.addEventListener("pause", () => {
      if (played) persist(true);
      if (bound && bound.audio === audio) {
        try { navigator.mediaSession.playbackState = "paused"; } catch {}
        positionState(audio);   // freshest paused position on the lock screen
      }
    });
    audio.addEventListener("seeked", () => {
      if (bound && bound.audio === audio) positionState(audio);
    });
    const onLeave = () => { if (played) persist(true); };
    window.addEventListener("pagehide", onLeave);
    document.addEventListener("visibilitychange", () => { if (document.hidden) onLeave(); });
    audio.addEventListener("ended", () => {
      // Always "pending" until the server CONFIRMS — navigator.onLine=true with
      // an expired session used to mark it synced while the push 401ed away.
      try { localStorage.setItem("done:" + slug, "pending");
            localStorage.removeItem("pos:" + slug); } catch {}
      pushServer(slug, 0, audio.duration || 0, true, false)
        .then((ok) => { if (ok) try { localStorage.setItem("done:" + slug, "1"); } catch {} });
    });
    const del = document.createElement("button");
    del.textContent = "Remove";
    del.onclick = async () => {
      audio.pause();                 // stop a card that's mid-playback before it vanishes
      audio.removeAttribute("src"); audio.load();
      await c.delete(req);
      try { localStorage.removeItem("offline:" + slug); } catch {}
      li.remove();
    };
    li.append(t, s, audio, del);
    list.append(li);
  }

  // an initial flush already ran before building the list; re-flush whenever
  // connectivity returns (e.g. landing after a flight)
  window.addEventListener("online", () => flushPositions(slugs));
  // mobile may fire neither `online` nor `load` reliably after a freeze/resume —
  // retry the flush whenever the page is brought back to the foreground
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) flushPositions(slugs);
  });

  // storage line: actual saved-audio size, plus how much room is left on device
  let line = keys.length
    ? fmt(savedBytes) + " of audio saved (" + keys.length +
      " episode" + (keys.length === 1 ? "" : "s") + ")"
    : "";
  if (navigator.storage && navigator.storage.estimate) {
    try {
      const est = await navigator.storage.estimate();
      const free = Math.max(0, (est.quota || 0) - (est.usage || 0));
      line += (line ? " · " : "") + "~" + fmt(free) + " free on this device";
    } catch {}
  }
  document.getElementById("quota").textContent = line;
})();
</script>
</body>
</html>
