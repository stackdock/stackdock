{% extends "base.html" %}
{% block title %}Log in · {{ site_title }}{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>Log in</h2>
  {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <label>Username <input name="username" required autofocus autocomplete="username"></label>
    <label>Password <input name="password" type="password" required autocomplete="current-password"></label>
    <button type="submit">Log in</button>
  </form>
  <p class="hint">Forgot your password? <a href="/forgot">Request a reset</a>.<br>
     Have an invite code? <a href="/signup">Create an account</a>.</p>
</div>
{% endblock %}
