{% extends "base.html" %}
{% block title %}Reset password · {{ site_title }}{% endblock %}
{% block content %}
<div class="meme-stage">
  <img class="jak flip" src="/static/soyjak.svg" alt="">
  <div class="meme-card">
    <h2>Redemption arc</h2>
    <p class="greentext">&gt;one-time link accepted<br>&gt;choose a password you'll remember this time</p>
    {% if error %}<p class="form-error">&gt;{{ error }}</p>{% endif %}
    <form method="post" action="/reset/{{ token }}">
      <label>New password (8+ chars) <input name="new" type="password" required minlength="8" autocomplete="new-password"></label>
      <label>New password (again) <input name="new2" type="password" required minlength="8" autocomplete="new-password"></label>
      <button type="submit">Reset &amp; log in</button>
    </form>
  </div>
  <img class="jak" src="/static/soyjak.svg" alt="">
</div>
{% endblock %}
