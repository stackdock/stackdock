{% extends "base.html" %}
{% block title %}Reset password · {{ site_title }}{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>Set a new password</h2>
  {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
  <form method="post" action="/reset/{{ token }}">
    <label>New password <input name="new" type="password" required minlength="8" autocomplete="new-password"></label>
    <label>New password (again) <input name="new2" type="password" required minlength="8" autocomplete="new-password"></label>
    <button type="submit">Reset password</button>
  </form>
</div>
{% endblock %}
