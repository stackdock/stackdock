{% extends "base.html" %}
{% block title %}Sign up · {{ site_title }}{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>Create account</h2>
  {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
  <form method="post" action="/signup">
    <label>Invite code <input name="invite" value="{{ invite }}" required></label>
    <label>Username <input name="username" required autocomplete="username"></label>
    <label>Password <input name="password" type="password" required minlength="8" autocomplete="new-password"></label>
    <label>Password (again) <input name="password2" type="password" required minlength="8" autocomplete="new-password"></label>
    <button type="submit">Sign up</button>
  </form>
  <p class="hint">Already have an account? <a href="/login">Log in</a>.</p>
</div>
{% endblock %}
