<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#2e6e4e">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Stackdock">
  <link rel="icon" type="image/svg+xml" href="/static/rss.svg">
</head>
<body>
  <header class="masthead">
    <a class="wordmark" href="/"><img class="brand-chud" src="/static/chud-spin-clear.svg" alt="">{{ site_title }}</a>
    <nav>
      {% if user is defined and user %}
        <a href="/">Articles</a>
        <a href="/?tab=audio">Podcasts</a>
        <a href="/accounts">Accounts</a>
        <a href="/status">Status</a>
        <a href="/account">Account</a>
        {% if user.is_admin %}<a href="/admin">Admin</a>{% endif %}
        <a href="/logout">Log out</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>Chud Use ONLY | Enforced by Sovereign Citizen Maritime Law<br>
    <span class="footer-temple">✝ running on TempleOS v5.03</span></footer>
<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");
</script>
</body>
</html>
