# cap per-container logs so hourly ingest chatter can't fill the droplet disk
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  stackdock:
    build: .
    restart: unless-stopped
    # tini as PID 1 reaps zombie processes — the NYT pull's Chromium leaves
    # defunct crashpad stubs when force-killed; without an init they'd accumulate.
    init: true
    env_file: .env
    logging: *default-logging
    # surfaces a HUNG (not just crashed) app as unhealthy in `docker ps` and to
    # the uptime-kuma monitor — unless-stopped only reacts to a full crash
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).status==200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    volumes:
      - stackdock-data:/data
    expose:
      - "8000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - kuma-data:/app/data
    expose:
      - "3001"

  caddy:
    image: caddy:2
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  stackdock-data:
  kuma-data:
  caddy-data:
  caddy-config:
